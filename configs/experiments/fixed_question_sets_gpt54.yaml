backend: openai

n_examples: 50
noise_variants_per_question: 1
noise_assignment: round_robin
random_seed: 42

noise_types:
  - typos_grammar
  - ambiguity
  - layperson
  - incomplete
  - overgeneralization

api_mode: responses
supports_temperature: false

noise_model: gpt-5.4
repair_model: gpt-5.4

reasoning_effort_noise: low
reasoning_effort_repair: low

temperature_noise: 0.8
temperature_repair: 0.2

max_tokens_noise: 150
max_tokens_repair: 120

max_validation_retries_noise: 2
max_validation_retries_repair: 2

paths:
  processed_data: data/processed/benchmarks/fixed_question_sets_gpt54
  outputs: data/outputs/benchmarks/fixed_question_sets_gpt54
  cache: data/outputs/benchmarks/fixed_question_sets_gpt54/cache
