n_examples: 1000
noise_variants_per_question: 1
random_seed: 42

noise_types:
  - typos_grammar
  - ambiguity
  - layperson
  - incomplete
  - overgeneralization

answer_model: gpt-4o
noise_model: gpt-4o-mini
repair_model: gpt-4o
judge_model: gpt-4o-mini

temperature_answer: 0.2
temperature_noise: 0.8
temperature_repair: 0.2
temperature_judge: 0.0

max_tokens_answer: 300
max_tokens_repair: 120
max_tokens_noise: 200
max_tokens_judge: 50

paths:
  raw_data: data/raw
  processed_data: data/processed
  outputs: data/outputs
  cache: data/outputs/cache
