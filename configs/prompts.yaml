noise:
  system: >
    You are a text-perturbation engine for robustness testing.
    Rewrite each medical question so it becomes meaningfully harder to answer
    while still pointing to the same underlying medical topic.

    Your rewrite must be noticeably noisier than the original, not just a light
    paraphrase.

    HARD RULES:
    - Return exactly one rewritten question.
    - Do not answer the question.
    - Do not explain your changes.
    - Do not ask for clarification.
    - Do not add labels such as "Rewritten question:", "Original question:",
      or any bullets, numbering, quotation marks, or meta commentary.
    - Preserve the broad medical intent, but degrade clarity according to the
      requested noise type.
    - Keep the output plausible as something a real user might type.

  user_template: >
    Noise type: {noise_type}

    Original question:
    {question}

    Make the noise strong enough that the rewritten question is clearly harder
    than the original.

    Noise-type instructions:
    - typos_grammar:
      introduce 5-9 realistic typos, spacing issues, punctuation mistakes,
      casing mistakes, or grammatical errors; keep it readable but messy.
    - ambiguity:
      make the wording substantially more vague; remove or blur at least one key
      medical detail so the question could plausibly be interpreted in more than
      one way.
    - layperson:
      replace technical medical terms with informal patient language, symptom
      descriptions, or everyday wording; avoid the formal disease/procedure name
      where possible.
    - incomplete:
      drop one or two important details such as the exact condition, body part,
      timeframe, population, or qualifier so the request feels underspecified.
    - overgeneralization:
      broaden the scope so a specific disease, symptom, test, or treatment is
      turned into a more generic health question.

    Silent self-check before answering:
    - Is the rewrite materially noisier than the original?
    - Does it still point to the same general medical intent?
    - Is the output exactly one noisy question and nothing else?

    Rewritten question:

repair:
  system: >
    You are a medical query clarification assistant. Your job is to rewrite
    a potentially noisy or unclear patient question into a clear, well-formed
    medical question. Do NOT answer the question. Only rewrite it.

    HARD RULES:
    - Return exactly one rewritten question.
    - Do not answer the question.
    - Do not explain your changes.
    - Do not ask the user for more context or clarification.
    - Do not add labels such as "Rewritten question:" or any bullets or quotes.
    - Keep the underlying medical intent as close as possible to the noisy input.
    - If the noisy question is underspecified, make the best possible clear rewrite
      from the available text instead of asking a follow-up question.
    - The output must be a single standalone question and nothing else.

  user_template: >
    Patient question:
    {question}

    Rewrite this into one clear medical question.
    Do not ask for clarification. Use best-effort rewriting only.

    Rewritten clear question:

answer:
  system: >
    You are a knowledgeable medical assistant. Answer the following medical
    question accurately and concisely based on established medical knowledge.
    Provide a direct, factual answer.

  user_template: >
    Question:
    {question}

geval:
  system: >
    You are a strict medical QA evaluator using G-Eval style reasoning.
    Compare the predicted answer against the question and the reference answer.
    Think step by step privately about factual alignment, logical consistency,
    completeness, and whether the prediction directly answers the question.

    Scoring rubric:
    1 = Very poor. Wrong, contradictory, or mostly irrelevant.
    2 = Weak. Some relevant content, but major factual gaps or logic problems.
    3 = Fair. Partly correct, but incomplete, vague, or inconsistently grounded.
    4 = Good. Mostly correct and logically consistent, with only minor omissions.
    5 = Excellent. Highly aligned with the reference, logically consistent, complete, and direct.

    IMPORTANT RULES:
    - Judge against the reference answer first, not your outside medical knowledge.
    - Penalize contradictions, unsupported leaps, and internal inconsistency.
    - Reward directness, completeness, and faithful reasoning.
    - The score MUST be exactly one integer in {1, 2, 3, 4, 5}.
    - Return ONLY the score digit itself.
    - Do not output any explanation, JSON, markdown, or extra text.

  user_template: >
    Question:
    {question}

    Reference answer:
    {reference}

    Predicted answer:
    {prediction}

    Evaluate the predicted answer for deep quality and logical consistency.
    Return ONLY one digit: 1, 2, 3, 4, or 5.
